<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroColheita Pro - Gestão Total</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15803d">
    <link rel="apple-touch-icon" href="icone.png">

    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        .input-destaque { border: 2px solid #e2e8f0; transition: all 0.2s; }
        .input-destaque:focus { border-color: #15803d; box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.2); outline: none; }
        #placa { text-transform: uppercase; }
        @media print { .no-print { display: none; } }
        
        /* Ajuste do Container da Imagem */
        .header-image-container {
            width: 100%;
            max-height: 300px; /* Evita que o topo fique grande demais */
            overflow: hidden;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        /* Se a imagem faltar, não mostra o texto de erro gigante */
        img[alt]:after {  
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-10">

    <div class="max-w-md mx-auto no-print">
        <!-- Cabeçalho -->
        <header class="bg-white rounded-t-lg shadow-lg overflow-hidden border border-gray-200">
            <div class="header-image-container">
                <!-- Certifique-se que o arquivo icone.png está na mesma pasta -->
                <img src="icone.png" onerror="this.style.display='none'" alt="AgroColheita Pro Logo">
            </div>
            <div class="p-4 bg-green-800 text-white">
                <h1 class="text-xl font-bold flex items-center gap-2">🚜 AgroColheita Pro</h1>
                <p class="text-xs opacity-80">Conversão de Sacas & Relatórios</p>
            </div>
        </header>

        <!-- Formulário -->
        <main class="bg-white p-5 shadow-md rounded-b-lg space-y-4 border-x border-b border-gray-200">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="fazenda" class="p-3 bg-gray-50 rounded border input-destaque" placeholder="Fazenda">
                <input type="text" id="talhao" class="p-3 bg-gray-50 rounded border input-destaque" placeholder="Talhão">
                
                <div class="col-span-2">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Cultura</label>
                    <select id="cultura" class="w-full p-3 bg-gray-50 rounded border input-destaque text-lg">
                        <option value="Soja">🌱 Soja</option>
                        <option value="Milho">🌽 Milho</option>
                        <option value="Sorgo">🌾 Sorgo</option>
                        <option value="Gergelim">✨ Gergelim</option>
                        <option value="Girassol">🌻 Girassol</option>
                    </select>
                </div>

                <input type="text" id="motorista" class="p-3 bg-gray-50 rounded border input-destaque" placeholder="Motorista">
                <input type="text" id="placa" oninput="this.value = this.value.toUpperCase()" class="p-3 bg-gray-50 rounded border input-destaque" placeholder="Placa">
                <input type="text" id="destino" class="col-span-2 p-3 bg-gray-50 rounded border input-destaque" placeholder="Destino (Armazém)">
                
                <div class="col-span-2 bg-orange-50 p-3 rounded-lg border-2 border-orange-200">
                    <label class="block text-xs font-black text-orange-800 uppercase mb-1">Peso Nota Guia (kg)</label>
                    <input type="text" id="pesoNotaGuiaDisplay" inputmode="numeric" oninput="mascaraPeso(this, 'pesoNotaGuiaRaw')" class="w-full bg-transparent text-2xl font-black text-orange-900 outline-none" placeholder="0">
                    <input type="hidden" id="pesoNotaGuiaRaw">
                </div>
            </div>

            <button onclick="salvarSaida()" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-lg shadow-md active:scale-95 transition-all text-lg">
                REGISTRAR SAÍDA
            </button>
        </main>

        <!-- Relatórios e Totais -->
        <div class="mt-6 grid grid-cols-2 gap-2">
            <button onclick="gerarRelatorioPDF()" class="bg-blue-700 hover:bg-blue-800 text-white p-3 rounded-lg font-bold text-sm shadow flex items-center justify-center gap-2">
                📄 GERAR PDF
            </button>
            <button onclick="limparTudo()" class="bg-red-50 text-red-700 p-3 rounded-lg font-bold text-sm border border-red-200">
                🗑️ LIMPAR SAFRA
            </button>
        </div>

        <div id="resumoGeral" class="mt-6 bg-green-900 text-white p-4 rounded-xl shadow-xl space-y-2 border-2 border-green-700">
            <h3 class="text-xs font-bold uppercase opacity-70">Total Consolidado (Balança)</h3>
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-2xl font-black" id="totalKg">0 kg</p>
                    <p class="text-xs opacity-80">Peso Líquido Total</p>
                </div>
                <div class="text-right">
                    <p class="text-3xl font-black text-yellow-400" id="totalSacas">0</p>
                    <p class="text-xs opacity-80">Sacas de 60kg</p>
                </div>
            </div>
        </div>

        <div id="listaCargas" class="mt-6 space-y-4"></div>

        <footer class="mt-10 mb-10 text-center text-gray-500 text-xs">
            Desenvolvido por João Divino Barbosa<br>
            Registro Copyright 2026
        </footer>
    </div>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("Erro SW:", err));
        }

        let cargas = JSON.parse(localStorage.getItem('agro_v3')) || [];

        function mascaraPeso(input, hiddenId) {
            let v = input.value.replace(/\D/g, "");
            if(hiddenId) document.getElementById(hiddenId).value = v;
            input.value = v ? new Intl.NumberFormat('pt-BR').format(v) : "";
        }

        function salvarSaida() {
            const campos = {
                fazenda: document.getElementById('fazenda').value,
                talhao: document.getElementById('talhao').value,
                motorista: document.getElementById('motorista').value,
                placa: document.getElementById('placa').value,
                destino: document.getElementById('destino').value,
                pesoRaw: document.getElementById('pesoNotaGuiaRaw').value
            };

            if(!campos.fazenda || !campos.talhao || !campos.motorista || !campos.placa || !campos.destino || !campos.pesoRaw) {
                return alert("⚠️ Preencha todos os campos!");
            }

            cargas.unshift({
                id: Date.now(),
                fazenda: campos.fazenda,
                talhao: campos.talhao,
                cultura: document.getElementById('cultura').value,
                motorista: campos.motorista,
                placa: campos.placa.toUpperCase(),
                destino: campos.destino,
                pesoNotaGuia: parseInt(campos.pesoRaw),
                data: new Date().toLocaleString('pt-BR'),
                pesoReal: null,
                status: 'Pendente'
            });
            
            salvarData();
            document.getElementById('pesoNotaGuiaDisplay').value = "";
            document.getElementById('pesoNotaGuiaRaw').value = "";
            document.getElementById('motorista').value = "";
            document.getElementById('placa').value = "";
        }

        function confirmarPesoReal(id) {
            const val = document.getElementById(`inputReal-${id}`).value.replace(/\D/g, "");
            if(!val) return alert("Digite o peso!");
            const idx = cargas.findIndex(c => c.id === id);
            cargas[idx].pesoReal = parseInt(val);
            cargas[idx].status = 'Concluído';
            salvarData();
        }

        function editarPeso(id) {
            const idx = cargas.findIndex(c => c.id === id);
            cargas[idx].status = 'Pendente';
            salvarData();
        }

        function excluirCarga(id) {
            if(confirm("Excluir registro?")) {
                cargas = cargas.filter(c => c.id !== id);
                salvarData();
            }
        }

        function salvarData() {
            localStorage.setItem('agro_v3', JSON.stringify(cargas));
            renderizar();
        }

        function renderizar() {
            const lista = document.getElementById('listaCargas');
            lista.innerHTML = "";
            let somaKg = 0;
            let somaSacas = 0;

            cargas.forEach(c => {
                const sacas = c.pesoReal ? (c.pesoReal / 60).toFixed(2) : 0;
                if(c.pesoReal) {
                    somaKg += c.pesoReal;
                    somaSacas += parseFloat(sacas);
                }

                lista.innerHTML += `
                    <div class="bg-white border-l-8 ${c.status === 'Pendente' ? 'border-orange-400' : 'border-green-600'} p-4 rounded-lg shadow-sm border border-gray-200 relative">
                        <button onclick="excluirCarga(${c.id})" class="absolute top-2 right-2 text-gray-300">✕</button>
                        <div class="text-[10px] font-bold text-gray-400 uppercase">${c.fazenda} | ${c.talhao} - ${c.data}</div>
                        <div class="text-[10px] font-bold text-green-700">${c.cultura.toUpperCase()} -> ${c.destino.toUpperCase()}</div>
                        <h3 class="text-lg font-black">${c.placa} | ${c.motorista}</h3>
                        
                        <div class="grid grid-cols-2 gap-2 mt-2 bg-gray-50 p-2 rounded">
                            <div class="text-xs">Nota: <b>${new Intl.NumberFormat('pt-BR').format(c.pesoNotaGuia)} kg</b></div>
                            <div class="text-right text-xs">Real: <b class="text-green-700">${c.pesoReal ? new Intl.NumberFormat('pt-BR').format(c.pesoReal) + ' kg' : '---'}</b></div>
                        </div>

                        ${c.status === 'Pendente' 
                            ? `<div class="mt-3 flex gap-2">
                                <input type="text" id="inputReal-${c.id}" inputmode="numeric" oninput="mascaraPeso(this)" placeholder="Balança" class="flex-1 p-2 border rounded font-bold text-sm">
                                <button onclick="confirmarPesoReal(${c.id})" class="bg-blue-600 text-white px-4 rounded font-bold text-sm">OK</button>
                               </div>`
                            : `<div class="mt-2 flex justify-end">
                                <span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full font-black text-xs">💰 ${new Intl.NumberFormat('pt-BR').format(sacas)} SACAS</span>
                                <button onclick="editarPeso(${c.id})" class="ml-2 text-gray-400">✎</button>
                               </div>`
                        }
                    </div>
                `;
            });

            document.getElementById('totalKg').innerText = new Intl.NumberFormat('pt-BR').format(somaKg) + " kg";
            document.getElementById('totalSacas').innerText = new Intl.NumberFormat('pt-BR').format(somaSacas.toFixed(2));
        }

        async function gerarRelatorioPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Relatório AgroColheita Pro", 14, 20);
            const tableData = cargas.map(c => [c.data, c.fazenda, c.placa, c.motorista, c.pesoNotaGuia, c.pesoReal || 'Pend.', (c.pesoReal/60 || 0).toFixed(2)]);
            doc.autoTable({ head: [['Data', 'Fazenda', 'Placa', 'Motorista', 'Nota', 'Real', 'Sacas']], body: tableData, startY: 30 });
            doc.save(`Safra_${Date.now()}.pdf`);
        }

        function limparTudo() {
            if(confirm("Apagar todos os dados da safra?")) {
                cargas = [];
                salvarData();
            }
        }
        renderizar();
    </script>
</body>
</html>
